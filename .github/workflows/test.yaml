# This workflow will install Python dependencies, run tests and lint with a variety of Python versions
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-python

name: test

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-matrix:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest]
        toolchain:
          - {compiler: gcc,   version: 'latest', system: gfortran}
    runs-on: ${{ matrix.os }}

    steps:
    - uses: actions/checkout@v4
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v3
      with:
        python-version: ${{ matrix.python-version }}
    - name: Install dependencies
      run: |
        if [ "$RUNNER_OS" == "Linux" ]; then
          sudo apt-get update
          sudo apt-get install -y libcairo2-dev libhdf5-dev libcfitsio-dev 
          echo "Contents of current dir"
          git clone https://github.com/danieljprice/giza
          make SYSTEM=gfortran withgiza
          pip install imagehash
        fi

        
    - name: Check files
      run: |
        export SPLASH_DIR=/home/runner/work/splash/splash
        export PATH=$PATH:$SPLASH_DIR/bin
        export LD_LIBRARY_PATH=$LD_LIBRARY_PATH:$SPLASH_DIR/giza/lib


        mkdir test_data ; cd test_data
        wget -O 2i_00000 "https://zenodo.org/records/10052253/files/2i_00000?download=1"

        splash 2i_00000 -r 6 -dev out_2i.png

        python $SPLASH_DIR/tests/test_figure_hash.py        