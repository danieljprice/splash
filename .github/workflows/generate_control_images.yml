name: Generate control images

on:
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install pillow "imagehash>=4.3.2" "numpy<2.0"

      - name: Generate control images
        run: python scripts/generate_renders.py
        env:
          SPLASH_DIR: ${{ github.workspace }}

      - name: Commit control images
        run: |
          git config user.name  "github-actions"
          git config user.email "github-actions@github.com"
          git add data/control_images/*.png
          git commit -m "Update control images [skip ci]"
          git push